# Source: app/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: controlplane-sa
  namespace: resilops
  labels:
    helm.sh/chart: app-0.1.0
    app.kubernetes.io/name: controlplane
    app.kubernetes.io/instance: controlplane
    app.kubernetes.io/version: "0.0.0"
    app.kubernetes.io/managed-by: Helm
automountServiceAccountToken: true
---
# Source: app/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: controlplane-configmap
  namespace: resilops
data:
  DEBUG: "false"
  ENV: "local"
---
# Source: app/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: controlplane
  namespace: resilops
  labels:
    helm.sh/chart: app-0.1.0
    app.kubernetes.io/name: controlplane
    app.kubernetes.io/instance: controlplane
    app.kubernetes.io/version: "0.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  ports:
