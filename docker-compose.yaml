version: '3.9'

services:
  agent:
    build:
      context: .
      dockerfile: docker/Agent
    restart: unless-stopped
    command: poetry run fault-agent
    volumes:
      - ./src/agent:/home/agent
    environment:
      - RESILTY_FAULT_AGENT_API_KEY_ID=test
      - RESILTY_FAULT_AGENT_API_SECRET_KEY=test
    depends_on:
      - controlplane
  controlplane:
    build:
      context: .
      dockerfile: docker/Mockserver
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: >
      uvicorn server.app:app
      --host 0.0.0.0
      --port 8000
      --reload
    volumes:
      - ./mockserver/server:/home/server
