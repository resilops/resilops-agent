nameOverride: agent
fullnameOverride: "Resilience Agent"

workload:
  type: deployment

replicaCount: 2

autoscaling:
  enabled: false

serviceAccount:
    create: true
    name: agent-sa

image:
  repository: resilience-agent
  tag: ""

service:
  enabled: false

ingress:
  enabled: false

livenessProbe:
  exec:
    command:
      - "sh"
      - "-c"
      - "pgrep -f 'resilience-agent' || exit 1"
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  exec:
    command:
      - "sh"
      - "-c"
      - "pgrep -f 'resilience-agent' || exit 1"
  initialDelaySeconds: 10
  periodSeconds: 10


environment_variable:
  enabled: true
  data:
    ENV: production
    LOG_LEVEL: INFO
    LOG_MAX_MB: '50'
    LOG_BACKUP_COUNT: '5'
    RESILTY_AGENT_CONTROL_PLANE_API_HOST: https://controlplane.resilty.io
    RESILTY_AGENT_AUTH_SERVICE_HOST: https://auth.resilty.io
    RESILTY_AGENT_TARGET_NAMESPACES: '{{ join "," .Values.rbac.namespaced.namespaces }}'
    RESILTY_AGENT_NAMESPACE: '{{ .Release.Namespace }}'
    RESILTY_AGENT_CONFIG_VERSION: '' # Inserted through helm command

migration:
  enabled: false

rbac:
  enabled: true
  namespaced:
    roleName: resiltyio-rbac-ns
    namespaces: []
    rules:
      - apiGroups: [""]
        resources: ["pods"]
        verbs: ["get", "list", "watch", "delete"]
      - apiGroups: [""]
        resources: ["pods/exec"]
        verbs: ["get", "create"]
      - apiGroups: ["apps"]
        resources: ["deployments"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["autoscaling"]
        resources: ["horizontalpodautoscalers"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["policy"]
        resources: ["poddisruptionbudgets"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["metrics.k8s.io"]
        resources: ["pods"]
        verbs: ["get", "list"]
  cluster:
    roleName: resiltyio-rbac-cluster
    rules:
      - nonResourceURLs: ["/version"]
        verbs: ["get"]
  current:
    # Applies to the current namespace
    roleName: resiltyio-agent-rbac
    rules:
      - apiGroups: ["coordination.k8s.io"]
        resources: ["leases"]
        verbs: ["get", "create", "update", "patch"]

volumeMounts:
  - name: agent-logs
    mountPath: /var/log/agent


volumes:
  - name: agent-logs
    emptyDir:
      sizeLimit: 500Mi


containerCommand: ["poetry","run","resilience-agent"]
