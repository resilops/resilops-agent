{{- if and .Values.rbac.enabled .Values.rbac.namespaced .Values.rbac.namespaced.namespaces }}
{{- range .Values.rbac.namespaced.namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $.Values.rbac.namespaced.roleName }}-{{ . }}
  namespace: {{ . }}
  labels:
    app.kubernetes.io/name: {{ $.Chart.Name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
subjects:
  - kind: ServiceAccount
    name: {{ include "resilienceAgent.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ $.Values.rbac.namespaced.roleName }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
