{{- if and .Values.rbac.enabled .Values.rbac.namespaced .Values.rbac.namespaced.namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.rbac.namespaced.roleName }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
{{ toYaml .Values.rbac.namespaced.rules | indent 2 }}
{{- end }}
