image:
  repository: resilience-agent
  tag: local

environment_variable:
  enabled: true
  data:
    ENV: local
    RESILTY_AGENT_CONTROL_PLANE_API_HOST: http://controlplane.resiltyio.svc.cluster.local:8000
    RESILTY_AGENT_AUTH_SERVICE_HOST: http://controlplane.resiltyio.svc.cluster.local:8000

fluentbit:
  config:
    outputs: |
      # Output for events
      [OUTPUT]
          Name          http
          Match         resilty.agent.events
          Host          controlplane.resiltyio.svc.cluster.local
          Port          8000
          URI           /api/v1/ingest/events
          Format        json
          tls           Off
          Retry_Limit   3

      # Output for metrics
      [OUTPUT]
          Name          http
          Match         resilty.agent.metrics
          Host          controlplane.resiltyio.svc.cluster.local
          Port          8000
          URI           /api/v1/ingest/metrics
          Format        json
          tls           Off
          Retry_Limit   3
