
fluentbit:
  enabled: true
  image:
    repository: fluent/fluent-bit
    tag: 4.2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  command:
    - /fluent-bit/bin/fluent-bit
    - -c
    - /fluent-bit/etc/fluent-bit.conf
  volumeMounts:
    - name: fluentbit-config
      mountPath: /fluent-bit/etc
    - name: agent-logs
      mountPath: /var/log/agent
      readOnly: true
  volumes:
    - name: fluentbit-config
      configMap:
        name: agent-fluentbit
  config:
    service: |
      [SERVICE]
          Flush        5
          Daemon       Off
          Log_Level    info
          Parsers_File parsers.conf

    parsers: |
      [PARSER]
          Name        json
          Format      json
          Time_Key    time
          Time_Format %Y-%m-%d %H:%M:%S,%L
          Time_Keep   On

    inputs: |
      [INPUT]
          Name              tail
          Path              /var/log/agent/agent.log*
          Parser            json
          Tag               resilty.agent
          Refresh_Interval  5
          Skip_Long_Lines   On
          Mem_Buf_Limit     10MB

    filters: |
      # Route events to resilty.agent.events
      [FILTER]
          Name          rewrite_tag
          Match         resilty.agent
          Rule          $type ^event$ resilty.agent.events true

      # Route metrics to resilty.agent.metrics
      [FILTER]
          Name          rewrite_tag
          Match         resilty.agent
          Rule          $type ^metrics$ resilty.agent.metrics true

    outputs: |
      # Output for events
      [OUTPUT]
          Name          http
          Match         resilty.agent.events
          Host          controlplane.resilty.io
          Port          443
          URI           /api/v1/ingest/events
          Format        json
          tls           On
          Retry_Limit   3

      # Output for metrics
      [OUTPUT]
          Name          http
          Match         resilty.agent.metrics
          Host          controlplane.resilty.io
          Port          443
          URI           /api/v1/ingest/metrics
          Format        json
          tls           On
          Retry_Limit   3
