name: Release Agent Chart
run-name: Release Agent Chart ${{ inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing Git tag to package and push, for example v1.2.3
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CHART_DIR: ./helm/agent
  CHART_REPO: oci://ghcr.io/${{ github.repository_owner }}/charts

jobs:
  release-chart:
    runs-on: ubuntu-latest

    steps:
      - name: Check out tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 1

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint "$CHART_DIR"

      - name: Package chart
        run: |
          set -euo pipefail
          mkdir -p dist
          helm package "$CHART_DIR" --destination dist

      - name: Log in to GHCR
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | helm registry login "$REGISTRY" \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Push chart to GHCR
        run: |
          set -euo pipefail
          chart_package="$(find dist -maxdepth 1 -type f -name '*.tgz' -print -quit)"

          if [[ -z "$chart_package" ]]; then
            echo "Chart package not found in dist/" >&2
            exit 1
          fi

          helm push "$chart_package" "$CHART_REPO"
