name: Release Agent
run-name: Release Agent ${{ inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing Git tag to release, for example v1.2.3
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-agent-${{ inputs.tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  CHART_DIR: ./helm/agent
  IMAGE_NAME: resilops-agent

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-in-project: true

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          poetry install --only main,test --no-interaction --no-root

      - name: Run CI tests
        shell: bash
        run: |
          set -euo pipefail
          make cicd-test

  release:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Check out tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 1

      - name: Compute metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"

          version="${tag#v}"
          image_repo="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"
          chart_repo="oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image_repo=$image_repo" >> "$GITHUB_OUTPUT"
          echo "chart_repo=$chart_repo" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR for Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to GHCR for Helm
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | helm registry login "${{ env.REGISTRY }}" \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/agent.Dockerfile
          target: base
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Lint chart
        shell: bash
        run: |
          set -euo pipefail
          helm lint "$CHART_DIR" \
            --set image.repository="${{ steps.meta.outputs.image_repo }}" \
            --set image.tag="${{ steps.meta.outputs.version }}"

      - name: Package chart
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          helm package "$CHART_DIR" \
            --version "${{ steps.meta.outputs.version }}" \
            --app-version "${{ steps.meta.outputs.version }}" \
            --destination dist

      - name: Push chart to GHCR
        shell: bash
        run: |
          set -euo pipefail
          chart_package="$(find dist -maxdepth 1 -type f -name '*.tgz' -print -quit)"
          helm push "$chart_package" "${{ steps.meta.outputs.chart_repo }}"
